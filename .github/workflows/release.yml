name: Release Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build plugin
        run: mvn -B clean package

      - name: Archive release bundle
        run: zip -r singular-user-storage-provider-${{ github.sha }}-dist.zip dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: singular-user-storage-provider-dist
          path: |
            dist/*.jar
            singular-user-storage-provider-${{ github.sha }}-dist.zip
          if-no-files-found: error

  tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Create next version tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          version_base=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | tail -n 1)
          latest_matching_tag=$(git tag --list "v${version_base}.*" --sort=version:refname | tail -n 1)

          if [ -z "$latest_matching_tag" ]; then
            new_tag="v${version_base}.0"
          else
            current_patch=${latest_matching_tag##*.}
            next_patch=$((current_patch + 1))
            new_tag="v${version_base}.${next_patch}"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$new_tag" -m "Release $new_tag"
          git push origin "$new_tag"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build release artifacts
        run: mvn -B clean package

      - name: Archive release bundle
        run: zip -r singular-user-storage-provider-${{ github.ref_name }}-dist.zip dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.jar
            singular-user-storage-provider-${{ github.ref_name }}-dist.zip