name: Release Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build plugin
        run: mvn -B clean package

      - name: Archive release bundle
        run: zip -r singular-user-storage-provider-${{ github.sha }}-dist.zip dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: singular-user-storage-provider-dist
          path: |
            dist/*.jar
            singular-user-storage-provider-${{ github.sha }}-dist.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build release artifacts
        run: mvn -B clean package

      - name: Archive release bundle
        run: zip -r singular-user-storage-provider-${{ github.ref_name }}-dist.zip dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.jar
            singular-user-storage-provider-${{ github.ref_name }}-dist.zip